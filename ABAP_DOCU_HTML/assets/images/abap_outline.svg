<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">ABAP Keyword Documentation Tree</title>
  <desc id="desc">Left-to-right tree structure of ABAP keyword documentation topics.</desc>
  <style>
    text { font-family: 'Segoe UI', 'Helvetica', 'Arial', sans-serif; fill: #0f172a; }
    .root { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
    .group { font-size: 16px; font-weight: 700; fill: #0284c7; }
    .item { font-size: 13px; font-weight: 400; fill: #0f172a; }
    .line { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
    .branch { stroke: #0284c7; stroke-width: 2.5; fill: none; }
    .node { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
  </style>

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1600" height="1100" fill="url(#bg)" />

  <!-- Root node (left) -->
  <rect class="node" x="20" y="470" width="160" height="60" rx="8" ry="8" />
  <text class="root" x="100" y="503" text-anchor="middle">ABAP Doc</text>

  <!-- Horizontal spine from root -->
  <line class="branch" x1="180" y1="500" x2="350" y2="500" />

  <!-- Level 2: 7 main categories -->
  <!-- 1. 语法与数据 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="80" />
  <line class="branch" x1="350" y1="80" x2="420" y2="80" />
  <rect class="node" x="420" y="55" width="140" height="50" rx="6" ry="6" />
  <text class="group" x="490" y="80">语法与数据</text>
  <line class="branch" x1="560" y1="80" x2="650" y2="30" />
  <line class="branch" x1="560" y1="80" x2="650" y2="55" />
  <line class="branch" x1="560" y1="80" x2="650" y2="80" />
  <line class="branch" x1="560" y1="80" x2="650" y2="105" />
  <text class="item" x="655" y="33">关键字总览</text>
  <text class="item" x="655" y="58">基本/深类型对齐</text>
  <text class="item" x="655" y="83">系统字段sy-*</text>
  <text class="item" x="655" y="108">文字/数值模板</text>

  <!-- 2. 内表与字段符号 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="240" />
  <line class="branch" x1="350" y1="240" x2="420" y2="240" />
  <rect class="node" x="420" y="210" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="240">内表与字段符号</text>
  <line class="branch" x1="560" y1="240" x2="650" y2="180" />
  <line class="branch" x1="560" y1="240" x2="650" y2="210" />
  <line class="branch" x1="560" y1="240" x2="650" y2="240" />
  <line class="branch" x1="560" y1="240" x2="650" y2="270" />
  <line class="branch" x1="560" y1="240" x2="650" y2="300" />
  <text class="item" x="655" y="185">ASSIGN/CASTING</text>
  <text class="item" x="655" y="215">标准/排序/哈希表</text>
  <text class="item" x="655" y="245">APPEND/INSERT性能</text>
  <text class="item" x="655" y="275">sy-tabix/sy-subrc</text>
  <text class="item" x="655" y="305">VALUE/FOR/FILTER</text>

  <!-- 3. 过程与异常 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="400" />
  <line class="branch" x1="350" y1="400" x2="420" y2="400" />
  <rect class="node" x="420" y="370" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="400">过程与异常</text>
  <line class="branch" x1="560" y1="400" x2="650" y2="350" />
  <line class="branch" x1="560" y1="400" x2="650" y2="380" />
  <line class="branch" x1="560" y1="400" x2="650" y2="410" />
  <line class="branch" x1="560" y1="400" x2="650" y2="440" />
  <text class="item" x="655" y="355">CALL FUNCTION参数</text>
  <text class="item" x="655" y="385">动态调用安全校验</text>
  <text class="item" x="655" y="415">RFC/UPDATE TASK</text>
  <text class="item" x="655" y="445">异常模型与错误码</text>

  <!-- 4. SQL 与 CDS -->
  <line class="branch" x1="350" y1="500" x2="350" y2="560" />
  <line class="branch" x1="350" y1="560" x2="420" y2="560" />
  <rect class="node" x="420" y="530" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="560">SQL 与 CDS</text>
  <line class="branch" x1="560" y1="560" x2="650" y2="500" />
  <line class="branch" x1="560" y1="560" x2="650" y2="535" />
  <line class="branch" x1="560" y1="560" x2="650" y2="565" />
  <line class="branch" x1="560" y1="560" x2="650" y2="595" />
  <text class="item" x="655" y="505">Open SQL操作</text>
  <text class="item" x="655" y="540">窗口函数/分组集合</text>
  <text class="item" x="655" y="570">CDS定义与注解</text>
  <text class="item" x="655" y="600">注入防护与缓冲</text>

  <!-- 5. UI / 选择屏 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="720" />
  <line class="branch" x1="350" y1="720" x2="420" y2="720" />
  <rect class="node" x="420" y="690" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="720">UI / 选择屏</text>
  <line class="branch" x1="560" y1="720" x2="650" y2="660" />
  <line class="branch" x1="560" y1="720" x2="650" y2="690" />
  <line class="branch" x1="560" y1="720" x2="650" y2="720" />
  <line class="branch" x1="560" y1="720" x2="650" y2="750" />
  <text class="item" x="655" y="665">AT SELECTION-SCREEN</text>
  <text class="item" x="655" y="695">事件顺序与双触发</text>
  <text class="item" x="655" y="725">参数校验与消息</text>
  <text class="item" x="655" y="755">F1/F4帮助、流逻辑</text>

  <!-- 6. 内存/并发/最佳实践 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="880" />
  <line class="branch" x1="350" y1="880" x2="420" y2="880" />
  <rect class="node" x="420" y="850" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="880">内存/并发/实践</text>
  <line class="branch" x1="560" y1="880" x2="650" y2="820" />
  <line class="branch" x1="560" y1="880" x2="650" y2="850" />
  <line class="branch" x1="560" y1="880" x2="650" y2="880" />
  <line class="branch" x1="560" y1="880" x2="650" y2="910" />
  <text class="item" x="655" y="825">会话/内部会话</text>
  <text class="item" x="655" y="855">共享内存对象与锁</text>
  <text class="item" x="655" y="885">LUW/事务管理</text>
  <text class="item" x="655" y="915">性能优化与安全</text>

  <!-- 7. 导航与使用 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="1040" />
  <line class="branch" x1="350" y1="1040" x2="420" y2="1040" />
  <rect class="node" x="420" y="1010" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="1040">导航与使用</text>
  <line class="branch" x1="560" y1="1040" x2="650" y2="1010" />
  <line class="branch" x1="560" y1="1040" x2="650" y2="1035" />
  <line class="branch" x1="560" y1="1040" x2="650" y2="1060" />
  <text class="item" x="655" y="1015">树导航与搜索</text>
  <text class="item" x="655" y="1040">自动路径映射</text>
  <text class="item" x="655" y="1065">集中资源管理</text>

  <!-- Group: 语法与数据（左上） -->
  <rect class="bubble" x="170" y="240" width="380" height="160" rx="14" ry="14" />
  <text class="group" x="200" y="270">语法与数据</text>
  <text class="item" x="200" y="300">- 关键字总览、语句分类</text>
  <text class="item" x="200" y="325">- 基本/深类型、对齐与长度匹配</text>
  <text class="item" x="200" y="350">- 系统字段：sy-subrc、sy-tabix、sy-index</text>
  <text class="item" x="200" y="375">- 文字/数值/字符串模板、对齐和截断规则</text>
  <rect class="tag" x="430" y="248" width="90" height="22" rx="6" ry="6" />
  <text class="tag-text" x="475" y="263" text-anchor="middle">核心语法</text>

  <!-- Group: 内表与字段符号（中上） -->
  <rect class="bubble" x="510" y="240" width="380" height="190" rx="14" ry="14" />
  <text class="group" x="540" y="270">内表与字段符号</text>
  <text class="item" x="540" y="300">- ASSIGN/CASTING、FIELD-SYMBOLS 生命周期</text>
  <text class="item" x="540" y="325">- 标准/排序/哈希表：键、唯一性、性能特征</text>
  <text class="item" x="540" y="350">- APPEND/INSERT/MODIFY/DELETE 对 sy-tabix/sy-subrc 的影响</text>
  <text class="item" x="540" y="375">- 排序与稳定性、辅助键、虚拟排序（FILTER/REDUCE/ITERATOR）</text>
  <text class="item" x="540" y="400">- 范围表达式、VALUE 构造器、FOR/LET 派生</text>
  <rect class="tag" x="760" y="248" width="110" height="22" rx="6" ry="6" />
  <text class="tag-text" x="815" y="263" text-anchor="middle">数据处理</text>

  <!-- Group: 过程与异常（右上） -->
  <rect class="bubble" x="890" y="240" width="340" height="170" rx="14" ry="14" />
  <text class="group" x="920" y="270">过程与异常</text>
  <text class="item" x="920" y="300">- CALL FUNCTION：参数表、动态调用安全、DESTINATION</text>
  <text class="item" x="920" y="325">- RFC/更新任务：IN UPDATE TASK、STARTING NEW TASK</text>
  <text class="item" x="920" y="350">- 方法/函数异常模型：类异常、运行时错误码</text>
  <text class="item" x="920" y="375">- 清理与提交：FORM/方法结束、CLEANUP、ROLLBACK/COMMIT</text>
  <rect class="tag" x="1080" y="248" width="90" height="22" rx="6" ry="6" />
  <text class="tag-text" x="1125" y="263" text-anchor="middle">过程控制</text>

  <!-- Group: SQL 与 CDS（左中） -->
  <rect class="bubble" x="170" y="460" width="380" height="200" rx="14" ry="14" />
  <text class="group" x="200" y="490">SQL 与 CDS</text>
  <text class="item" x="200" y="520">- Open SQL：WHERE/IN/EXISTS、GROUP BY、HAVING、ORDER BY</text>
  <text class="item" x="200" y="545">- 连接、CTE/UNION、窗口函数、分组集合</text>
  <text class="item" x="200" y="570">- CDS：定义、关联、注解、客户端处理、缓存/缓冲</text>
  <text class="item" x="200" y="595">- 安全与性能：注入防护、参数校验、索引与限定客户端</text>
  <rect class="tag" x="430" y="468" width="110" height="22" rx="6" ry="6" />
  <text class="tag-text" x="485" y="483" text-anchor="middle">数据访问</text>

  <!-- Group: UI / 选择屏（中下） -->
  <rect class="bubble" x="510" y="460" width="380" height="180" rx="14" ry="14" />
  <text class="group" x="540" y="490">UI / 选择屏</text>
  <text class="item" x="540" y="520">- AT SELECTION-SCREEN 事件序列，屏幕/子屏双触发</text>
  <text class="item" x="540" y="545">- 参数/选择条件校验、消息、状态栏、GUI 状态</text>
  <text class="item" x="540" y="570">- F1/F4 帮助、屏幕元素/布局、流逻辑</text>
  <text class="item" x="540" y="595">- SUBSCREEN/CHAIN、TABSTRIP、动态调用/回调</text>
  <rect class="tag" x="760" y="468" width="110" height="22" rx="6" ry="6" />
  <text class="tag-text" x="815" y="483" text-anchor="middle">交互界面</text>

  <!-- Group: 内存/并发/最佳实践（右中） -->
  <rect class="bubble" x="890" y="460" width="340" height="210" rx="14" ry="14" />
  <text class="group" x="920" y="490">内存 / 并发 / 最佳实践</text>
  <text class="item" x="920" y="520">- 会话/内部会话、上下文、内存区域</text>
  <text class="item" x="920" y="545">- 共享内存对象、锁、并发访问限制</text>
  <text class="item" x="920" y="570">- LUW/更新任务、事务与提交/回滚</text>
  <text class="item" x="920" y="595">- 动态语句安全校验、过时语法替代</text>
  <text class="item" x="655" y="915">性能优化与安全</text>

  <!-- 7. 导航与使用 -->
  <line class="branch" x1="350" y1="500" x2="350" y2="1040" />
  <line class="branch" x1="350" y1="1040" x2="420" y2="1040" />
  <rect class="node" x="420" y="1010" width="140" height="60" rx="6" ry="6" />
  <text class="group" x="490" y="1040">导航与使用</text>
  <line class="branch" x1="560" y1="1040" x2="650" y2="1010" />
  <line class="branch" x1="560" y1="1040" x2="650" y2="1035" />
  <line class="branch" x1="560" y1="1040" x2="650" y2="1060" />
  <text class="item" x="655" y="1015">树导航与搜索</text>
  <text class="item" x="655" y="1040">自动路径映射</text>
  <text class="item" x="655" y="1065">集中资源管理</text>
</svg>
