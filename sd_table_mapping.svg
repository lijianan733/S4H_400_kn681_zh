<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .title { font: bold 30px Arial, "Microsoft YaHei", sans-serif; fill: #1f3b5b; }
      .section { font: bold 22px Arial, "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .boxTitle { font: bold 22px Arial, "Microsoft YaHei", sans-serif; fill: #17324d; }
      .boxText { font: 18px Arial, "Microsoft YaHei", sans-serif; fill: #17324d; }
      .small { font: 16px Arial, "Microsoft YaHei", sans-serif; fill: #17324d; }
      .arrowLabel { font: 15px Arial, "Microsoft YaHei", sans-serif; fill: #444; background: #fff; }
      .node { fill: #fff; stroke: #2f4f6f; stroke-width: 2.2; rx: 16; ry: 16; }
      .nodeSoft { fill: #f7fbff; stroke: #2f4f6f; stroke-width: 2; rx: 16; ry: 16; }
      .sectionBar1 { fill: #4a90e2; }
      .sectionBar2 { fill: #50a773; }
      .sectionBar3 { fill: #d9863b; }
      .lane { fill: #f9fbfd; stroke: #d6e0ea; stroke-width: 1.5; rx: 24; ry: 24; }
      .flow { stroke: #2f4f6f; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
      .legend { font: 16px Arial, "Microsoft YaHei", sans-serif; fill: #17324d; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f4f6f" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1100" fill="#ffffff" />
  <text x="60" y="60" class="title">SAP SD 表关系简化图：销售订单 -> 交货 -> 开票</text>

  <rect x="40" y="100" width="520" height="930" class="lane" />
  <rect x="640" y="100" width="500" height="930" class="lane" />
  <rect x="1200" y="100" width="540" height="930" class="lane" />

  <rect x="70" y="120" width="460" height="42" class="sectionBar1" rx="12" ry="12" />
  <text x="300" y="148" text-anchor="middle" class="section">销售订单</text>
  <rect x="680" y="120" width="420" height="42" class="sectionBar2" rx="12" ry="12" />
  <text x="890" y="148" text-anchor="middle" class="section">交货 / 发运</text>
  <rect x="1240" y="120" width="460" height="42" class="sectionBar3" rx="12" ry="12" />
  <text x="1470" y="148" text-anchor="middle" class="section">开票</text>

  <!-- Sales order nodes -->
  <rect x="130" y="200" width="200" height="90" class="node" />
  <text x="230" y="235" text-anchor="middle" class="boxTitle">VBAK</text>
  <text x="230" y="262" text-anchor="middle" class="boxText">销售订单头</text>

  <rect x="360" y="200" width="180" height="90" class="nodeSoft" />
  <text x="450" y="235" text-anchor="middle" class="boxTitle">VBAP</text>
  <text x="450" y="262" text-anchor="middle" class="boxText">销售订单项目</text>

  <rect x="120" y="340" width="150" height="78" class="nodeSoft" />
  <text x="195" y="372" text-anchor="middle" class="boxTitle">VBPA</text>
  <text x="195" y="398" text-anchor="middle" class="small">伙伴数据</text>

  <rect x="295" y="340" width="150" height="78" class="nodeSoft" />
  <text x="370" y="372" text-anchor="middle" class="boxTitle">VBKD</text>
  <text x="370" y="398" text-anchor="middle" class="small">业务数据</text>

  <rect x="470" y="340" width="150" height="78" class="nodeSoft" />
  <text x="545" y="372" text-anchor="middle" class="boxTitle">VBEP</text>
  <text x="545" y="398" text-anchor="middle" class="small">排程行</text>

  <rect x="130" y="470" width="190" height="78" class="nodeSoft" />
  <text x="225" y="502" text-anchor="middle" class="boxTitle">VBBE</text>
  <text x="225" y="528" text-anchor="middle" class="small">销售需求</text>

  <rect x="360" y="470" width="180" height="78" class="nodeSoft" />
  <text x="450" y="502" text-anchor="middle" class="boxTitle">VBFA</text>
  <text x="450" y="528" text-anchor="middle" class="small">单据流</text>

  <rect x="170" y="610" width="170" height="78" class="nodeSoft" />
  <text x="255" y="642" text-anchor="middle" class="boxTitle">VBUK</text>
  <text x="255" y="668" text-anchor="middle" class="small">头状态</text>

  <rect x="380" y="610" width="170" height="78" class="nodeSoft" />
  <text x="465" y="642" text-anchor="middle" class="boxTitle">VBUP</text>
  <text x="465" y="668" text-anchor="middle" class="small">项目状态</text>

  <!-- Delivery nodes -->
  <rect x="720" y="205" width="180" height="90" class="node" />
  <text x="810" y="240" text-anchor="middle" class="boxTitle">LIKP</text>
  <text x="810" y="267" text-anchor="middle" class="boxText">交货单头</text>

  <rect x="930" y="205" width="180" height="90" class="nodeSoft" />
  <text x="1020" y="240" text-anchor="middle" class="boxTitle">LIPS</text>
  <text x="1020" y="267" text-anchor="middle" class="boxText">交货单项目</text>

  <rect x="695" y="355" width="170" height="78" class="nodeSoft" />
  <text x="780" y="387" text-anchor="middle" class="boxTitle">VTTK</text>
  <text x="780" y="413" text-anchor="middle" class="small">运输头</text>

  <rect x="890" y="355" width="170" height="78" class="nodeSoft" />
  <text x="975" y="387" text-anchor="middle" class="boxTitle">VTTP</text>
  <text x="975" y="413" text-anchor="middle" class="small">运输项目</text>

  <rect x="720" y="500" width="180" height="78" class="nodeSoft" />
  <text x="810" y="532" text-anchor="middle" class="boxTitle">VEKP</text>
  <text x="810" y="558" text-anchor="middle" class="small">装运单头</text>

  <rect x="930" y="500" width="180" height="78" class="nodeSoft" />
  <text x="1020" y="532" text-anchor="middle" class="boxTitle">VEPO</text>
  <text x="1020" y="558" text-anchor="middle" class="small">装运单项目</text>

  <!-- Billing nodes -->
  <rect x="1270" y="205" width="190" height="90" class="node" />
  <text x="1365" y="240" text-anchor="middle" class="boxTitle">VBRK</text>
  <text x="1365" y="267" text-anchor="middle" class="boxText">开票头</text>

  <rect x="1500" y="205" width="170" height="90" class="nodeSoft" />
  <text x="1585" y="240" text-anchor="middle" class="boxTitle">VBRP</text>
  <text x="1585" y="267" text-anchor="middle" class="boxText">开票项目</text>

  <rect x="1250" y="355" width="150" height="78" class="nodeSoft" />
  <text x="1325" y="387" text-anchor="middle" class="boxTitle">KONV</text>
  <text x="1325" y="413" text-anchor="middle" class="small">定价条件</text>

  <rect x="1430" y="355" width="150" height="78" class="nodeSoft" />
  <text x="1505" y="387" text-anchor="middle" class="boxTitle">NAST</text>
  <text x="1505" y="413" text-anchor="middle" class="small">输出状态</text>

  <rect x="1610" y="355" width="110" height="78" class="nodeSoft" />
  <text x="1665" y="387" text-anchor="middle" class="boxTitle">VBSS</text>
  <text x="1665" y="413" text-anchor="middle" class="small">集体处理</text>

  <rect x="1250" y="500" width="150" height="78" class="nodeSoft" />
  <text x="1325" y="532" text-anchor="middle" class="boxTitle">VBSK</text>
  <text x="1325" y="558" text-anchor="middle" class="small">集体头</text>

  <rect x="1430" y="500" width="150" height="78" class="nodeSoft" />
  <text x="1505" y="532" text-anchor="middle" class="boxTitle">VKDFS</text>
  <text x="1505" y="558" text-anchor="middle" class="small">SD索引</text>

  <rect x="1610" y="500" width="110" height="78" class="nodeSoft" />
  <text x="1665" y="532" text-anchor="middle" class="boxTitle">VRPMA</text>
  <text x="1665" y="558" text-anchor="middle" class="small">按物料</text>

  <rect x="1330" y="640" width="170" height="78" class="nodeSoft" />
  <text x="1415" y="672" text-anchor="middle" class="boxTitle">VRKPA</text>
  <text x="1415" y="698" text-anchor="middle" class="small">按伙伴功能</text>

  <!-- Main arrows -->
  <path class="flow" d="M330 245 L360 245" />
  <path class="flow" d="M230 290 L195 340" />
  <path class="flow" d="M250 290 L325 340" />
  <path class="flow" d="M450 290 L450 340" />
  <path class="flow" d="M500 290 L545 340" />
  <path class="flow" d="M450 290 L225 470" />
  <path class="flow" d="M260 290 L450 470" />
  <path class="flow" d="M255 548 L255 610" />
  <path class="flow" d="M450 548 L465 610" />

  <path class="flow" d="M545 380 C620 360, 650 320, 720 250" />
  <path class="flow" d="M900 250 L930 250" />
  <path class="flow" d="M810 295 L810 355" />
  <path class="flow" d="M1020 295 L1020 355" />
  <path class="flow" d="M900 250 C940 320, 960 395, 980 355" />
  <path class="flow" d="M1020 295 C1000 360, 990 430, 1020 500" />

  <path class="flow" d="M1100 250 C1190 250, 1210 250, 1270 250" />
  <path class="flow" d="M1460 250 L1500 250" />
  <path class="flow" d="M1365 295 L1365 355" />
  <path class="flow" d="M1585 295 L1585 355" />
  <path class="flow" d="M1450 295 C1450 360, 1450 430, 1500 500" />
  <path class="flow" d="M1365 295 C1320 360, 1320 430, 1325 500" />
  <path class="flow" d="M1365 295 C1410 360, 1450 470, 1505 500" />
  <path class="flow" d="M1365 295 C1500 350, 1590 430, 1665 355" />
  <path class="flow" d="M1365 295 C1500 410, 1600 470, 1665 500" />
  <path class="flow" d="M1365 295 C1400 500, 1410 560, 1415 640" />

  <!-- Cross relations labels -->
  <text x="255" y="320" class="arrowLabel">VBELN</text>
  <text x="418" y="320" class="arrowLabel">VBELN</text>
  <text x="930" y="320" class="arrowLabel">VBELN</text>
  <text x="1310" y="320" class="arrowLabel">VBELN / KNUMV</text>
  <text x="1460" y="320" class="arrowLabel">VBELN</text>

  <!-- Notes -->
  <rect x="40" y="980" width="1700" height="78" fill="#f5f8fc" stroke="#d6e0ea" rx="18" ry="18" />
  <text x="65" y="1010" class="legend">核心主线：</text>
  <text x="165" y="1010" class="legend">VBAK / VBAP</text>
  <text x="305" y="1010" class="legend">→ LIKP / LIPS</text>
  <text x="445" y="1010" class="legend">→ VBRK / VBRP</text>
  <text x="605" y="1010" class="legend">；辅助表：</text>
  <text x="710" y="1010" class="legend">VBFA / VBUK / VBUP / KONV / NAST</text>
  <text x="65" y="1042" class="legend">常见字段：</text>
  <text x="165" y="1042" class="legend">VBELN（单据号）</text>
  <text x="355" y="1042" class="legend">POSNR（项目号）</text>
  <text x="555" y="1042" class="legend">KNUMV（条件号）</text>
  <text x="765" y="1042" class="legend">TKNUM（运输号）</text>
</svg>
